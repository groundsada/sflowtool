name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    strategy:
      matrix:
        arch: [x86_64, aarch64, armv7]
        include:
          - arch: x86_64
            container: ubuntu:22.04
          - arch: aarch64
            container: arm64v8/ubuntu:22.04
          - arch: armv7
            container: arm32v7/ubuntu:22.04
      fail-fast: false

    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libcjson-dev

      - name: Bootstrap
        run: ./boot.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Test
        run: make check || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sflowtool-linux-${{ matrix.arch }}
          path: src/sflowtool
          if-no-files-found: ignore

  build-macos:
    strategy:
      matrix:
        os: [macos-13, macos-14]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install autoconf automake libtool pkg-config cjson

      - name: Bootstrap
        run: ./boot.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Test
        run: make check || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sflowtool-macos-${{ matrix.os }}
          path: src/sflowtool
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-autoconf
            mingw-w64-ucrt-x86_64-automake
            mingw-w64-ucrt-x86_64-libtool
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-cjson

      - name: Bootstrap
        shell: msys2 {0}
        run: ./boot.sh

      - name: Configure
        shell: msys2 {0}
        run: ./configure

      - name: Build
        shell: msys2 {0}
        run: make

      - name: Test
        shell: msys2 {0}
        run: make check || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sflowtool-windows-x86_64
          path: src/sflowtool.exe
          if-no-files-found: ignore

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archives
        run: |
          cd artifacts
          for dir in */; do
            (cd "$dir" && zip -r ../../${dir%/}.zip .)
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
