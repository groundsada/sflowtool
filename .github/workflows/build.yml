name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libcjson-dev \
            cppcheck

      - name: Run boot.sh
        run: ./boot.sh

      - name: Run configure
        run: ./configure

      - name: Run cppcheck
        run: |
          cppcheck -I . --enable=all --inconclusive --suppress=missingInclude --suppress=unusedVariable --suppress=unusedFunction --error-exitcode=0 src/

      - name: Check code style
        run: |
          # Check for trailing whitespace
          if grep -rI --exclude-dir=.git '[[:space:]]$' src/; then
            echo "Error: trailing whitespace found"
            exit 1
          fi

          # Check for tabs in C files (spaces preferred)
          if grep -rI --include='*.c' --include='*.h' $'\t' src/decoder/; then
            echo "Warning: tabs found in decoder source files"
          fi

  build-linux:
    needs: lint
    strategy:
      matrix:
        arch: [x86_64, aarch64, armv7]
        include:
          - arch: x86_64
            container: ubuntu:22.04
          - arch: aarch64
            container: arm64v8/ubuntu:22.04
          - arch: armv7
            container: arm32v7/ubuntu:22.04
      fail-fast: false

    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libcjson-dev

      - name: Bootstrap
        run: ./boot.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Test
        run: make check || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sflowtool-linux-${{ matrix.arch }}
          path: src/sflowtool
          if-no-files-found: ignore

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archives
        run: |
          cd artifacts
          for dir in */; do
            (cd "$dir" && zip -r ../../${dir%/}.zip .)
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
